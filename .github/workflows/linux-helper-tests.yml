name: Linux Helper Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-helper-tests:
    name: Linux helper functional tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mark Linux scripts executable
        run: chmod +x scripts/linux/*.sh
      - name: Run Linux helper functional tests
        run: scripts/linux/test-linux.sh
