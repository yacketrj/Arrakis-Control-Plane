name: Go Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true
      - name: Refresh Go module sums
        run: go mod download
      - name: Run Go tests
        run: go test ./...
