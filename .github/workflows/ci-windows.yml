name: CI Windows Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Windows compile and test
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Verify Go formatting
        shell: pwsh
        run: |
          $files = gofmt -l *.go
          if ($files) {
            Write-Host 'Go files need formatting:'
            $files | ForEach-Object { Write-Host $_ }
            exit 1
          }

      - name: Verify Go modules
        shell: pwsh
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
          go mod verify

      - name: Run Go vet
        shell: pwsh
        run: go vet ./...

      - name: Run Go tests
        shell: pwsh
        run: go test -v ./...

      - name: Build Go backend
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          go build -trimpath -o dist/windows/dune-admin.exe .

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: web
        run: npm audit --audit-level=high

      - name: Typecheck frontend
        working-directory: web
        run: npm run typecheck

      - name: Lint frontend
        working-directory: web
        run: npm run lint

      - name: Build frontend
        working-directory: web
        run: npm run build
