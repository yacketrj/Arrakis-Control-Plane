name: Go Module Integrity

on:
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
      - '**/*.go'
      - '.github/workflows/go-module-integrity.yml'
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - '**/*.go'
      - '.github/workflows/go-module-integrity.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-go-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Verify downloaded module checksums
        run: go mod verify
      - name: Run Go tests
        run: go test ./...
