name: Security Scans

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sca-go:
    name: SCA - Go modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true
      - name: Refresh Go module graph
        run: go mod tidy
      - name: Run Go tests and vet
        run: |
          go test ./...
          go vet ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  sca-node:
    name: SCA - npm dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies from package manifest
        working-directory: web
        run: npm install
      - name: Run npm audit
        working-directory: web
        run: npm audit --audit-level=high
      - name: Build frontend
        working-directory: web
        run: npm run build

  sast-codeql:
    name: SAST - CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: go,javascript-typescript
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  sast-gosec:
    name: SAST - gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true
      - name: Refresh Go module graph
        run: go mod tidy
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec high-confidence gate
        run: gosec -exclude=G104,G304,G306,G402,G106,G120,G703 -severity=medium -confidence=high ./...

  secrets:
    name: Secret scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dca-trivy:
    name: DCA - Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  dast-zap:
    name: DAST - OWASP ZAP baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Create CI backend environment
        run: |
          openssl rand -base64 32 | tr '+/' '-_' | tr -d '=\n' > /tmp/dune-admin-ci-token
          printf 'ADMIN_TOKEN=%s\n' "$(cat /tmp/dune-admin-ci-token)" > .env
          printf 'LISTEN_ADDR=127.0.0.1:8080\n' >> .env
          printf 'ALLOWED_ORIGINS=http://127.0.0.1:4173,http://localhost:4173,http://127.0.0.1:5173,http://localhost:5173\n' >> .env
          printf 'ADMIN_REQUIRE_REASON=true\n' >> .env
          printf 'DB_PASS=ci-placeholder\n' >> .env
          printf 'DUNE_CAPTURE_USER=dune_cap\n' >> .env
          printf 'DUNE_CAPTURE_PASS=ci-placeholder\n' >> .env
      - name: Refresh Go module graph
        run: go mod tidy
      - name: Start backend
        run: |
          go run . > /tmp/dune-admin-backend.log 2>&1 &
          echo $! > /tmp/dune-admin-backend.pid
          for i in {1..30}; do
            if curl -fsS -H "X-Admin-Token: $(cat /tmp/dune-admin-ci-token)" http://127.0.0.1:8080/api/v1/status; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/dune-admin-backend.log
          exit 1
      - name: Build and start frontend preview
        working-directory: web
        run: |
          npm install
          npm run build
          npm run preview -- --host 127.0.0.1 > /tmp/dune-admin-frontend.log 2>&1 &
          echo $! > /tmp/dune-admin-frontend.pid
          for i in {1..30}; do
            if curl -fsSI http://127.0.0.1:4173; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/dune-admin-frontend.log
          exit 1
      - name: Run ZAP baseline against frontend preview
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://127.0.0.1:4173
          fail_action: true
          allow_issue_writing: false
          rules_file_name: .zap/rules.tsv
          cmd_options: -a
      - name: Upload runtime logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-runtime-logs
          path: |
            /tmp/dune-admin-backend.log
            /tmp/dune-admin-frontend.log
