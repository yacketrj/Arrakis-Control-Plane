name: Remove Legacy Give Item Modal

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remove-legacy-give-item.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove legacy modal block
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('web/src/tabs/PlayersTab.tsx')
          text = p.read_text()
          start = '\n// ── Give Item Modal ────────────────────────────────────────────────────────────\n'
          end = '\n// ── Player Actions Modal ───────────────────────────────────────────────────────\n'
          if start in text and end in text:
              before, rest = text.split(start, 1)
              _, after = rest.split(end, 1)
              p.write_text(before + end + after)
          wf = Path('.github/workflows/remove-legacy-give-item.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit cleanup
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/tabs/PlayersTab.tsx .github/workflows/remove-legacy-give-item.yml
          git commit -m "refactor: remove legacy give-item modal"
          git push
