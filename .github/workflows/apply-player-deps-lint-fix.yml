name: Apply Player Dependency Lint Fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-player-deps-lint-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch files
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          players = Path('web/src/tabs/PlayersTab.tsx')
          text = players.read_text()
          text = text.replace('}, [open, player.faction_id])', '}, [open, player.faction_id, player.id])')
          players.write_text(text)

          changelog = Path('CHANGELOG.md')
          if changelog.exists():
              text = changelog.read_text()
              line = '- Fixed frontend lint warning by including `player.id` in the player action modal effect dependencies.'
              if line not in text:
                  text = text.replace('### Fixed\n\n', '### Fixed\n\n' + line + '\n', 1)
              changelog.write_text(text)

          notes = Path('PATCH_NOTES.md')
          if notes.exists():
              text = notes.read_text()
              heading = '## Current update: Player action dependency lint cleanup'
              if heading not in text:
                  block = '''## Current update: Player action dependency lint cleanup

### Why this update was made

Frontend lint reported one remaining React hook dependency warning in `PlayersTab.tsx`. The effect uses `player.id` when loading the current character XP, so the dependency list needs to include `player.id` to keep the effect accurate when the selected player changes.

### What changed

- Added `player.id` to the player action modal effect dependency array.
- Updated the changelog and patch notes for the lint cleanup.

### Validation

```bash
cd web
npm run lint
npm run build
```

---

'''
                  text = text.replace('# Dune Admin Release Notes\n\n', '# Dune Admin Release Notes\n\n' + block, 1)
              notes.write_text(text)

          workflow = Path('.github/workflows/apply-player-deps-lint-fix.yml')
          workflow.unlink(missing_ok=True)
          PY
      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/tabs/PlayersTab.tsx CHANGELOG.md PATCH_NOTES.md .github/workflows/apply-player-deps-lint-fix.yml
          git commit -m "fix: include player id in action effect dependencies"
          git push
