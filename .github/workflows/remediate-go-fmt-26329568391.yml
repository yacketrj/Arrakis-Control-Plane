name: Remediate Go Formatting 26329568391

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remediate-go-fmt-26329568391.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply Go formatting and docs
        run: |
          gofmt -w *.go
          python3 <<'PY'
          from pathlib import Path

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text()
          line = '- Fixed Go Quality run `26329568391` by committing `gofmt` output for database routine discovery and restored player handler formatting.'
          if line not in text:
              text = text.replace('### Fixed\n\n', '### Fixed\n\n' + line + '\n', 1)
          changelog.write_text(text)

          patch = Path('PATCH_NOTES.md')
          text = patch.read_text()
          if '## Current update: Go formatting remediation for run 26329568391' not in text:
              block = '''## Current update: Go formatting remediation for run 26329568391

### Why this update was made

GitHub Actions run `26329568391` failed at the Go formatting gate. The workflow ran `gofmt -w *.go` and found formatting drift in the new database routine discovery code and previously restored player handler code.

### Remediation

- Applied `gofmt` to all root Go files.
- Preserved behavior while normalizing Go source formatting.
- Updated release notes and changelog for the remediation.

### Validation

The next Go Quality run should proceed past the formatting gate and continue to module verification, vet, and tests.

---

'''
              if text.startswith('# Dune Admin Release Notes\n\n'):
                  text = text.replace('# Dune Admin Release Notes\n\n', '# Dune Admin Release Notes\n\n' + block, 1)
              else:
                  text = '# Dune Admin Release Notes\n\n' + block + text
          patch.write_text(text)

          workflow = Path('.github/workflows/remediate-go-fmt-26329568391.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit remediation
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: apply Go formatting remediation"
          git push
