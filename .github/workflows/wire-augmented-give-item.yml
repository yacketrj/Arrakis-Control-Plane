name: Wire Augmented Give Item Modal

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/wire-augmented-give-item.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wire:
    name: Wire augmented give-item modal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply source updates
        run: |
          python3 <<'PY'
          from pathlib import Path

          players = Path('web/src/tabs/PlayersTab.tsx')
          text = players.read_text()
          if "import GiveItemModalAugmented from './GiveItemModalAugmented'" not in text:
              text = text.replace(
                  "import { api } from '../api/client'\n",
                  "import { api } from '../api/client'\nimport GiveItemModalAugmented from './GiveItemModalAugmented'\n",
                  1,
              )
          text = text.replace(
              '<GiveItemModal player={selectedPlayer} open={showGiveItem} onClose={() => setShowGiveItem(false)} />',
              '<GiveItemModalAugmented player={selectedPlayer} open={showGiveItem} onClose={() => setShowGiveItem(false)} />',
          )
          text = text.replace(
              'function GiveItemModal({ player, open, onClose }: { player: Player; open: boolean; onClose: () => void }) {',
              'export function LegacyGiveItemModal({ player, open, onClose }: { player: Player; open: boolean; onClose: () => void }) {',
          )
          players.write_text(text)

          modal = Path('web/src/tabs/GiveItemModalAugmented.tsx')
          text = modal.read_text()
          text = text.replace(
              "        roll: aug.roll,\n        roll_count: aug.roll_count,\n        effect_indices: aug.effect_indices ?? [],",
              "        roll: aug.roll,\n        rolls: aug.rolls,\n        roll_count: aug.roll_count,\n        effect_indices: aug.effect_indices ?? [],",
          )
          modal.write_text(text)

          docs = Path('docs/augmented-give-items.md')
          text = docs.read_text()
          text = text.replace(
              "The backend API and client payload types support augmented item grants. A dedicated augmented give-item modal component exists in `web/src/tabs/GiveItemModalAugmented.tsx`. It should be wired into `PlayersTab.tsx` once the large player tab is split or refactored to avoid maintaining duplicate modal logic in one oversized file.",
              "The active Players tab now opens `web/src/tabs/GiveItemModalAugmented.tsx` from the Give Item button. The prior embedded modal remains exported as `LegacyGiveItemModal` only for short-term rollback/reference while the larger player tab is split into smaller components.",
          )
          docs.write_text(text)

          patch = Path('PATCH_NOTES.md')
          text = patch.read_text()
          text = text.replace(
              "The backend API, client payload types, tests, and a dedicated augmented modal component are in place. The currently displayed `PlayersTab.tsx` Give Item button still points at the embedded legacy modal. The new modal component should be wired by refactoring `PlayersTab.tsx` to remove the old embedded modal and avoid duplicate modal logic.",
              "The active `PlayersTab.tsx` Give Item button now opens `GiveItemModalAugmented.tsx`. The prior embedded modal has been renamed to `LegacyGiveItemModal` as a short-term rollback/reference component until the larger player tab is split into smaller files.",
          )
          text = text.replace(
              "- `GiveItemModalAugmented.tsx` exists but is not yet wired into the active `PlayersTab.tsx` button flow.\n",
              "- The legacy embedded Give Item modal remains exported as `LegacyGiveItemModal` for short-term rollback/reference and should be removed after the player tab is split into smaller files.\n",
          )
          patch.write_text(text)

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text()
          text = text.replace(
              "- Added a ready-to-wire augmented Give Item modal component at `web/src/tabs/GiveItemModalAugmented.tsx`.",
              "- Added and wired the augmented Give Item modal component at `web/src/tabs/GiveItemModalAugmented.tsx`.",
          )
          text = text.replace(
              "- The augmented backend API and frontend client types are in place. The dedicated augmented modal component exists but the current embedded `PlayersTab.tsx` Give Item modal still needs wiring/refactor before operators see the new augment controls in the existing button flow.",
              "- The Players tab Give Item button now opens the augmented Give Item modal. The prior embedded modal remains exported as `LegacyGiveItemModal` for short-term rollback/reference until the player tab is split into smaller files.",
          )
          changelog.write_text(text)

          workflow = Path('.github/workflows/wire-augmented-give-item.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit source updates
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/src/tabs/PlayersTab.tsx web/src/tabs/GiveItemModalAugmented.tsx docs/augmented-give-items.md PATCH_NOTES.md CHANGELOG.md .github/workflows/wire-augmented-give-item.yml
          git commit -m "feat: wire augmented give-item modal"
          git push
