name: Apply Public Status Route Patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-public-status-route.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply route patch
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('server.go')
          s = p.read_text()
          if 'GET /api/v1/public/status' not in s:
              s = s.replace('\tmux.HandleFunc("GET /api/v1/status", handleStatus)', '\tmux.HandleFunc("GET /api/v1/public/status", handlePublicStatus)\n\tmux.HandleFunc("GET /api/v1/status", handleStatus)')
          if 'func handlePublicStatus' not in s:
              marker = 'func handleStatus(w http.ResponseWriter, r *http.Request) {'
              public = 'func handlePublicStatus(w http.ResponseWriter, r *http.Request) {\n\tjsonOK(w, map[string]any{\n\t\t"service": "dune-admin",\n\t\t"status":  "online",\n\t})\n}\n\n'
              s = s.replace(marker, public + marker)
          p.write_text(s)

          c = Path('CHANGELOG.md')
          t = c.read_text()
          line = '- Added redacted unauthenticated public status endpoint at `/api/v1/public/status` for the future player-safe user portal.'
          if line not in t:
              t = t.replace('### Added\n\n', '### Added\n\n' + line + '\n', 1)
          c.write_text(t)

          pn = Path('PATCH_NOTES.md')
          t = pn.read_text()
          if '## Current update: Public status endpoint and DB routine wiring' not in t:
              insert = '# Dune Admin Release Notes\n\n## Current update: Public status endpoint and DB routine wiring\n\n### Why this update was made\n\nThe admin console is being split into player-safe user portal surfaces and protected admin tools. The user portal needs only reviewed, redacted public APIs. The DB routine inspection feature also needed final UI wiring.\n\n### What changed\n\n- Added `/api/v1/public/status` as a redacted unauthenticated status endpoint.\n- Kept sensitive status fields behind the protected `/api/v1/status` endpoint.\n- Wired the DB Routines admin tab into the main protected admin interface.\n- Documented the separation between public-safe portal data and protected admin operations.\n\n### Validation\n\n```bash\ngo test ./...\ncd web\nnpm install\nnpm audit --audit-level=high\nnpm run typecheck\nnpm run lint\nnpm run build\n```\n\n---\n\n'
              t = insert + t.replace('# Dune Admin Release Notes\n\n', '', 1)
          pn.write_text(t)

          wf = Path('.github/workflows/apply-public-status-route.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit changes
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.go CHANGELOG.md PATCH_NOTES.md .github/workflows/apply-public-status-route.yml
          git commit -m "feat: add redacted public status endpoint"
          git push
