name: Remediate Go Quality 26326549538

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remediate-go-quality-26326549538.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply remediation
        run: |
          python3 <<'PY'
          from pathlib import Path

          test = Path('give_items_augments_test.go')
          text = test.read_text()
          text = text.replace('if len(dbItemTemplates) != 3 {\n\t\tt.Fatalf("expected three merged templates, got %#v", dbItemTemplates)\n\t}', 'if len(dbItemTemplates) != 4 {\n\t\tt.Fatalf("expected four merged templates, got %#v", dbItemTemplates)\n\t}')
          text = text.replace('if len(rows) != 3 {\n\t\tt.Fatalf("expected three template rows, got %#v", rows)\n\t}', 'if len(rows) != 4 {\n\t\tt.Fatalf("expected four template rows, got %#v", rows)\n\t}')
          text = text.replace('foundFriendlyName := false\n\tfor _, row := range rows {\n\t\tif row.ID == "DB_TEMPLATE" && row.Name == "DB Template Friendly Name" {\n\t\t\tfoundFriendlyName = true\n\t\t}\n\t}\n\tif !foundFriendlyName {\n\t\tt.Fatalf("expected DB_TEMPLATE to use lower-case friendly name lookup, got %#v", rows)\n\t}\n}', 'foundFriendlyName := false\n\tfoundItemRuleTemplate := false\n\tfor _, row := range rows {\n\t\tif row.ID == "DB_TEMPLATE" && row.Name == "DB Template Friendly Name" {\n\t\t\tfoundFriendlyName = true\n\t\t}\n\t\tif row.ID == "item_rule_template" {\n\t\t\tfoundItemRuleTemplate = true\n\t\t}\n\t}\n\tif !foundFriendlyName {\n\t\tt.Fatalf("expected DB_TEMPLATE to use lower-case friendly name lookup, got %#v", rows)\n\t}\n\tif !foundItemRuleTemplate {\n\t\tt.Fatalf("expected curated item rule template to be merged, got %#v", rows)\n\t}\n}')
          test.write_text(text)

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text()
          if 'Fixed Go Quality run `26326549538` by aligning template merge test expectations with the hybrid database-plus-JSON merge behavior.' not in text:
              text = text.replace('### Fixed\n\n', '### Fixed\n\n- Fixed Go Quality run `26326549538` by aligning template merge test expectations with the hybrid database-plus-JSON merge behavior.\n', 1)
          changelog.write_text(text)

          patch = Path('PATCH_NOTES.md')
          text = patch.read_text()
          if '## Current update: Go Quality run 26326549538 remediation' not in text:
              insert = '''## Current update: Go Quality run 26326549538 remediation\n\n### Why this update was made\n\nGitHub Actions run `26326549538` failed in the expanded template merge test because the test expected three merged templates, while the hybrid merge correctly returns four: two live database templates, one curated name-only template, and one curated item-rule template.\n\n### Remediation\n\n- Updated the test to expect four merged templates.\n- Added explicit verification that the curated `item_rule_template` entry is present in the serialized template response.\n- Preserved the lower-case friendly-name lookup assertion for `DB_TEMPLATE`.\n\n### Validation\n\nThe next Go Quality run should proceed past `TestMergeItemTemplatesAndHandleGetTemplates`.\n\n---\n\n'''
              text = text.replace('## Current update: Give Item helper cleanup and expanded test coverage', insert + '## Previous update: Give Item helper cleanup and expanded test coverage', 1)
          patch.write_text(text)

          wf = Path('.github/workflows/remediate-go-quality-26326549538.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit remediation
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add give_items_augments_test.go CHANGELOG.md PATCH_NOTES.md .github/workflows/remediate-go-quality-26326549538.yml
          git commit -m "test: align template merge coverage with curated item rules"
          git push
